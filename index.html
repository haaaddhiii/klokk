<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Klokk</title>
<meta name="description" content="Klokk — a calm, minimal clock and focus timer.">
<meta name="author" content="Klokk">
<meta property="og:title" content="Klokk">
<meta property="og:description" content="A calm, minimal clock and focus timer.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Klokk">
<meta name="twitter:description" content="A calm, minimal clock and focus timer.">
<meta name="theme-color" content="#f5f0e8">
<meta name="google-site-verification" content="1DR30bkhcewpsri5P6FceA5OF7bHjjZlEWletEEnN7Q">
<meta name="robots" content="index, follow">
<meta name="keywords" content="klokk, clock, pomodoro timer, focus timer, minimal clock, productivity timer">
<link rel="canonical" href="https://klokk.netlify.app/">
<meta property="og:url" content="https://klokk.netlify.app/">
<meta property="og:site_name" content="Klokk">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5f0e8;
    --bg2:      #ede7d9;
    --ink:      #3a3530;
    --ink-soft: #6b5f56;
    --ink-faint:#8c7e74;
    --rose:     #b06a58;
    --rose-soft:#dbb8b0;
    --sage:     #5e7d62;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    overflow: hidden;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 50% 40%, rgba(255,248,235,0.45) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .view {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .view.hidden { opacity: 0; pointer-events: none; transform: translateY(6px); }

  /* ── CLOCK ── */
  .clock-wrap { text-align: center; position: relative; }

  #clock-format-btn {
    position: absolute;
    top: calc(100% + 20px);
    left: 50%;
    transform: translateX(-50%);
    margin: 0;
    white-space: nowrap;
  }

  .clock-time {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(80px, 18vw, 180px);
    line-height: 1;
    letter-spacing: -2px;
    color: var(--ink);
    opacity: 0;
    animation: gentle-appear 1.6s ease forwards;
  }

  .clock-seconds {
    font-family: 'DM Mono', monospace;
    font-size: clamp(14px, 2.2vw, 24px);
    color: var(--ink-soft);
    display: block;
    margin-top: 2px;
    opacity: 0;
    animation: gentle-appear 1.6s ease 0.2s forwards;
  }

  .clock-date {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: clamp(14px, 1.8vw, 20px);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 24px;
    opacity: 0;
    animation: gentle-appear 1.6s ease 0.4s forwards;
  }

  .breath-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--rose);
    margin: 32px auto 0;
    opacity: 0;
    animation: gentle-appear 1s ease 0.7s forwards, breathe 4s ease-in-out 1.8s infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.35; }
    50%       { transform: scale(1.7); opacity: 0.9; }
  }

  /* ── NAV ── */
  .nav {
    position: fixed;
    bottom: 44px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 32px;
    z-index: 200;
    transition: opacity 0.6s ease;
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 6px 0;
    border-bottom: 1px solid transparent;
    transition: color 0.4s, border-color 0.4s;
  }
  .nav-btn:hover { color: var(--ink); border-bottom-color: var(--rose-soft); }
  .nav-btn.active { color: var(--rose); border-bottom-color: var(--rose); }

  .settings-text-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-faint);
    transition: color 0.3s;
    margin-top: 20px;
  }
  .settings-text-btn:hover { color: var(--ink-soft); }

  /* Fullscreen Toggle Styling */
  #fs-btn {
    position: fixed;
    bottom: 40px;
    right: 40px;
    z-index: 200;
    font-size: 24px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0; /* Critical for centering */
    border-bottom: none !important;
    transition: transform 0.3s ease, color 0.3s ease, opacity 0.6s ease;
    transform-origin: center;
  }
  #fs-btn:hover {
    transform: scale(1.25);
    color: var(--rose);
    border-bottom: none !important;
  }

  /* ── POMODORO ── */
  .pomo-wrap { display: flex; flex-direction: column; align-items: center; width: 300px; }

  .pomo-label {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    transition: color 0.6s;
    width: 300px;
    text-align: center;
  }
  .pomo-label.break-mode { color: var(--sage); }

  .deco { display: none; }

  /* Ring — bigger */
  .pomo-ring {
    position: relative;
    width: 300px; height: 300px;
    margin-bottom: 24px;
  }
  .pomo-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .arc-track { fill: none; stroke: var(--bg2); stroke-width: 1.5; }
  .arc-fill {
    fill: none; stroke: var(--rose); stroke-width: 1.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
  }
  .arc-fill.break-mode { stroke: var(--sage); }

  .pomo-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .pomo-time-el {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 72px;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--ink);
    transition: color 0.6s;
  }
  .pomo-time-el.break-mode { color: var(--sage); }

  .pomo-phase {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--ink-soft);
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* Session dots */
  .pomo-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; width: 300px; }
  .pdot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ink-faint);
    transition: background 0.4s, transform 0.4s, box-shadow 0.4s;
  }
  .pdot.done   { background: var(--rose); }
  .pdot.active { background: var(--rose); transform: scale(1.5); box-shadow: 0 0 0 3px var(--rose-soft); }

  /* Controls row */
  .pomo-controls {
    display: flex; align-items: center; gap: 28px;
    justify-content: center;
    transition: opacity 0.6s ease;
    width: 300px;
  }
  .ctrl {
    background: none; border: none; cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-soft);
    transition: color 0.3s;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl:hover { color: var(--ink); }

  .ctrl-main {
    flex: 0 0 52px !important;
    width: 52px !important; height: 52px !important;
    border-radius: 50%;
    border: 1px solid var(--rose);
    background: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    letter-spacing: 0;
    color: var(--rose);
    transition: background 0.3s, transform 0.2s;
    padding: 0;
  }
  .ctrl-main:hover { background: var(--rose-soft); transform: scale(1.07); }

  /* ── POMODORO WRAPPERS ── */
  .pomo-display-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }
  .pomo-controls-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  /* ── SETTINGS PANEL ── */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(245,240,232,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .settings-overlay.open { opacity: 1; pointer-events: all; }

  .settings-panel {
    background: #faf7f2;
    border: 1px solid var(--rose-soft);
    padding: 48px 52px;
    width: 340px;
    transform: translateY(8px);
    transition: transform 0.4s ease;
  }
  .settings-overlay.open .settings-panel { transform: translateY(0); }

  .settings-title {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 36px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .setting-label {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .setting-control {
    display: flex; align-items: center; gap: 12px;
  }
  .num-btn {
    background: none; border: none; cursor: pointer;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--ink-faint);
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .num-btn:hover { border-color: var(--rose); color: var(--rose); background: var(--rose-soft); }
  .num-val {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 18px;
    color: var(--ink);
    min-width: 36px;
    text-align: center;
  }

  .settings-actions {
    display: flex; gap: 16px; justify-content: flex-end;
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid var(--bg2);
  }
  .s-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-soft);
    transition: color 0.3s;
  }
  .s-btn:hover { color: var(--ink); }
  .s-btn-primary {
    color: var(--rose);
    border-bottom: 1px solid var(--rose-soft);
    padding-bottom: 1px;
  }
  .s-btn-primary:hover { color: var(--ink); border-bottom-color: var(--ink-faint); }

  /* Idle hide */
  .hideable { transition: opacity 0.6s ease; }
  .ui-idle .hideable { opacity: 0 !important; pointer-events: none !important; }

  @keyframes gentle-appear {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LANDSCAPE (General) ── */
  @media (orientation: landscape) {
    .clock-time { font-size: clamp(60px, 12vw, 120px); }
    .clock-date { margin-top: 12px; font-size: clamp(11px, 1.4vw, 16px); }
    .breath-dot { margin-top: 16px; }
    .nav { bottom: 24px; }
    #fs-btn { 
      bottom: calc(20px + env(safe-area-inset-bottom)) !important; 
      right: calc(20px + env(safe-area-inset-right)) !important; 
      font-size: 20px;
      width: 40px;
      height: 40px;
    }
  }

  /* ── MOBILE LANDSCAPE (Side-by-side controls) ── */
  @media (orientation: landscape) and (max-height: 540px) {
    .pomo-wrap {
      flex-direction: row;
      width: auto;
      gap: 60px;
      padding: 0 20px;
      transition: gap 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .ui-idle .pomo-wrap {
      gap: 0;
    }

    .pomo-display-area {
      flex-shrink: 0;
      width: auto;
    }

    .pomo-controls-area {
      width: 180px;
      opacity: 1;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                  opacity 0.6s ease, 
                  transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                  margin 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: visible;
      transform-origin: center right;
    }

    .ui-idle .pomo-controls-area {
      width: 0;
      opacity: 0;
      margin-left: -60px; /* Counteracts the gap when hidden */
      transform: translateX(30px) scaleX(0.8);
      pointer-events: none;
    }

    /* Maintain content width inside the collapsing area */
    .pomo-controls-area > * {
      min-width: 180px;
    }

    /* Scaling for smaller landscape heights */
    .pomo-ring {
      width: clamp(150px, 65vh, 240px);
      height: clamp(150px, 65vh, 240px);
      margin-bottom: 12px;
    }
    .pomo-time-el {
      font-size: clamp(40px, 18vh, 56px);
    }
    .pomo-dots {
      width: 100%;
      margin-bottom: 0;
    }
    .pomo-controls {
      width: 180px;
      flex-direction: column;
      gap: 12px;
    }
    #play-btn { order: 1; }
    #btn-skip { order: 2; }
    #btn-reset { order: 3; }
    .ctrl-main {
      width: 48px !important; height: 48px !important;
    }
    .settings-text-btn {
      margin-top: 15px;
    }
  }
</style>
</head>
<body>

<!-- CLOCK VIEW -->
<div class="view" id="view-clock">
  <div class="clock-wrap">
    <div class="clock-time" id="clock-time">00:00</div>
    <span class="clock-seconds" id="clock-secs">00</span>
    <div class="clock-date" id="clock-date">Monday, 1 January</div>
    <div class="breath-dot"></div>
    <button class="settings-text-btn hideable" id="clock-format-btn" onclick="toggleFormatSetting()">24HR</button>
  </div>
</div>

<!-- POMODORO VIEW -->
<div class="view hidden" id="view-pomo">
  <div class="pomo-wrap">
    <!-- Timer Section -->
    <div class="pomo-display-area">
      <div class="deco"></div>
      <div class="pomo-ring">
        <svg class="pomo-svg" viewBox="0 0 300 300">
          <circle class="arc-track" cx="150" cy="150" r="136"/>
          <circle class="arc-fill" id="arc" cx="150" cy="150" r="136"
            stroke-dasharray="854.5" stroke-dashoffset="0"/>
        </svg>
        <div class="pomo-center">
          <div class="pomo-time-el" id="pomo-time">25:00</div>
          <div class="pomo-phase" id="pomo-phase">ready</div>
        </div>
      </div>
      <div class="pomo-dots" id="pomo-dots"></div>
    </div>

    <!-- Controls Section -->
    <div class="pomo-controls-area hideable">
      <div class="pomo-controls">
        <button class="ctrl" id="btn-reset" onclick="resetPomo()">reset</button>
        <button class="ctrl ctrl-main" id="play-btn" onclick="togglePomo()">▷</button>
        <button class="ctrl" id="btn-skip" onclick="skipPomo()">skip</button>
      </div>
      <button class="settings-text-btn" onclick="openSettings()">settings</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="nav hideable">
  <button class="nav-btn active" id="btn-clock" onclick="switchView('clock')">clock</button>
  <button class="nav-btn" id="btn-pomo" onclick="switchView('pomo')">focus</button>
</nav>

<!-- FULLSCREEN TOGGLE -->
<button class="nav-btn hideable" id="fs-btn" onclick="toggleFS()">⛶</button>


<!-- SETTINGS OVERLAY -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel">
    <div class="settings-title">Timer Settings</div>

    <div class="setting-row">
      <span class="setting-label">Focus</span>
      <div class="setting-control">
        <button class="num-btn" onclick="adjustSetting('work',-1)">−</button>
        <span class="num-val" id="set-work">25</span>
        <button class="num-btn" onclick="adjustSetting('work',1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <span class="setting-label">Short break</span>
      <div class="setting-control">
        <button class="num-btn" onclick="adjustSetting('short',-1)">−</button>
        <span class="num-val" id="set-short">5</span>
        <button class="num-btn" onclick="adjustSetting('short',1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <span class="setting-label">Long break</span>
      <div class="setting-control">
        <button class="num-btn" onclick="adjustSetting('long',-1)">−</button>
        <span class="num-val" id="set-long">15</span>
        <button class="num-btn" onclick="adjustSetting('long',1)">+</button>
      </div>
    </div>

    <div class="settings-actions">
      <button class="s-btn" onclick="closeSettings()">cancel</button>
      <button class="s-btn s-btn-primary" onclick="applySettings()">apply</button>
    </div>
  </div>
</div>

<script>
// ── IDLE HIDE ──
let idleTimer;
function onActivity() {
  document.body.classList.remove('ui-idle');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => document.body.classList.add('ui-idle'), 2800);
}
document.addEventListener('mousemove', onActivity);
document.addEventListener('touchstart', onActivity);
onActivity();

// ── FULLSCREEN ──
function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById('fs-btn').textContent = '❐';
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
      document.getElementById('fs-btn').textContent = '⛶';
    }
  }
}

// ── VIEW SWITCH ──
let current = 'clock';
function switchView(v) {
  document.getElementById('view-' + current).classList.add('hidden');
  document.getElementById('btn-' + current).classList.remove('active');
  current = v;
  document.getElementById('view-' + v).classList.remove('hidden');
  document.getElementById('btn-' + v).classList.add('active');
}

// ── CLOCK ──
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

let is24Hour = false;

function tickClock() {
  const n = new Date();
  let h = n.getHours();
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  
  if (!is24Hour) {
    h = h % 12 || 12;
  }
  const hDisplay = String(h).padStart(2,'0');

  document.getElementById('clock-time').textContent = hDisplay + ':' + m;
  document.getElementById('clock-secs').textContent = s;
  document.getElementById('clock-date').textContent =
    DAYS[n.getDay()] + ', ' + n.getDate() + ' ' + MONTHS[n.getMonth()];
}
tickClock(); setInterval(tickClock, 1000);

function toggleFormatSetting() {
  is24Hour = !is24Hour;
  document.getElementById('clock-format-btn').textContent = is24Hour ? '12HR' : '24HR';
  tickClock();
}

// ── POMODORO ──
const CIRC = 854.5;
const SESSIONS = 4;

// Editable settings (in minutes)
let cfg = { work: 25, short: 5, long: 15 };

let ps = {
  running: false, isBreak: false, session: 0,
  left: cfg.work * 60, total: cfg.work * 60, iv: null
};

function buildDots() {
  const c = document.getElementById('pomo-dots');
  if (!c) return;
  c.innerHTML = '';
  for (let i = 0; i < SESSIONS; i++) {
    const d = document.createElement('div');
    d.className = 'pdot'; d.id = 'pd' + i; c.appendChild(d);
  }
}

function renderPomo() {
  const { left, total, isBreak, session, running } = ps;
  const mm = String(Math.floor(left / 60)).padStart(2, '0');
  const ss = String(left % 60).padStart(2, '0');

  document.getElementById('pomo-time').textContent = mm + ':' + ss;
  document.getElementById('arc').style.strokeDashoffset = CIRC * (1 - left / total);

  const timeEl  = document.getElementById('pomo-time');
  const phaseEl = document.getElementById('pomo-phase');
  const arcEl   = document.getElementById('arc');
  const btn     = document.getElementById('play-btn');

  if (isBreak) {
    [timeEl, arcEl].forEach(e => e.classList.add('break-mode'));
    phaseEl.textContent = 'breathe';
  } else {
    [timeEl, arcEl].forEach(e => e.classList.remove('break-mode'));
    phaseEl.textContent = running ? `${session + 1} of ${SESSIONS}` : 'ready';
  }
  btn.textContent = running ? '⏸' : '▷';

  for (let i = 0; i < SESSIONS; i++) {
    const d = document.getElementById('pd' + i);
    if (!d) continue;
    d.className = 'pdot';
    if (i < session) d.classList.add('done');
    else if (i === session && !isBreak && running) d.classList.add('active');
  }
}

function togglePomo() {
  if (ps.running) { clearInterval(ps.iv); ps.running = false; }
  else { ps.running = true; ps.iv = setInterval(tickPomo, 1000); }
  renderPomo();
}

function tickPomo() {
  ps.left--;
  if (ps.left <= 0) { clearInterval(ps.iv); ps.running = false; advance(); return; }
  renderPomo();
}

function advance() {
  if (!ps.isBreak) {
    ps.isBreak = true;
    const mins = ps.session >= SESSIONS - 1 ? cfg.long : cfg.short;
    ps.total = mins * 60; ps.left = ps.total;
  } else {
    ps.isBreak = false;
    ps.session = (ps.session + 1) % SESSIONS;
    ps.total = cfg.work * 60; ps.left = ps.total;
  }
  ps.running = true;
  ps.iv = setInterval(tickPomo, 1000);
  renderPomo();
}

function resetPomo() {
  clearInterval(ps.iv);
  ps = { running: false, isBreak: false, session: 0,
         left: cfg.work * 60, total: cfg.work * 60, iv: null };
  renderPomo();
}

function skipPomo() {
  clearInterval(ps.iv); ps.running = false; ps.left = 0; advance();
}

// ── SETTINGS ──
// Temp values while editing
let tmpCfg = {};

function openSettings() {
  tmpCfg = { ...cfg };
  document.getElementById('set-work').textContent  = tmpCfg.work;
  document.getElementById('set-short').textContent = tmpCfg.short;
  document.getElementById('set-long').textContent  = tmpCfg.long;
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function adjustSetting(key, delta) {
  const mins = { work: [1,99], short: [1,30], long: [1,60] };
  const [min, max] = mins[key];
  tmpCfg[key] = Math.min(max, Math.max(min, tmpCfg[key] + delta));
  document.getElementById('set-' + key).textContent = tmpCfg[key];
}

function applySettings() {
  cfg = { ...tmpCfg };
  closeSettings();
  // Reset timer with new settings if not running
  if (!ps.running) {
    ps.left = cfg.work * 60;
    ps.total = cfg.work * 60;
    ps.isBreak = false;
    ps.session = 0;
    renderPomo();
  }
}

// Close overlay on background click
document.getElementById('settings-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

buildDots(); renderPomo();

</script>
